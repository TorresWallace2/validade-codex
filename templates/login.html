
{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header text-center">
          <h1 class="h4 mb-0">Gestor de Documentos</h1>
        </div>
        <div class="card-body">
          <form id="loginForm" class="vstack gap-3">
            <div>
              <label for="username" class="form-label">Usuario</label>
              <input type="text" class="form-control" id="username" required autocomplete="username">
            </div>
            <div>
              <label for="password" class="form-label">Senha</label>
              <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="1" id="rememberMe">
              <label class="form-check-label" for="rememberMe">
                Lembrar-me
              </label>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btnLogin">Entrar</button>
          </form>
        </div>
      </div>
      <p class="text-center text-muted small mt-3" id="loginInfo"></p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
  <script src="{{ url_for('static', filename='js/auth.js') }}" type="module"></script>
{% endblock %}
