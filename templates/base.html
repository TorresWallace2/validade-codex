
<!doctype html>
<html lang="pt-BR" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestor de Documentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="bg-body-secondary">
    {% if g.current_user %}
    <nav class="navbar navbar-expand bg-dark navbar-dark shadow-sm" id="userBanner">
      <div class="container-fluid">
        <span class="navbar-text text-light">
          Logado como <strong id="currentUserName">{{ g.current_user.username }}</strong>
          <span class="badge bg-secondary ms-2" id="currentUserRole">{{ g.current_user.role|capitalize }}</span>
        </span>
        <div class="d-flex gap-2">
          {% if g.current_user.is_admin %}
          <button class="btn btn-outline-light btn-sm" id="btnManageUsers" type="button">Gerenciar usuarios</button>
          {% endif %}
          <button class="btn btn-light btn-sm" id="btnLogout" type="button">Sair</button>
        </div>
      </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080">
      <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
